<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AI Code Risk Auditor</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f7f8fa;
        --surface: #ffffff;
        --text: #17202a;
        --muted: #5d6978;
        --line: #d8dde5;
        --accent: #1267b3;
        --accent-hover: #0f5798;
        --danger: #b42318;
        --warning: #b54708;
        --ok: #067647;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        line-height: 1.5;
      }

      main {
        width: min(980px, calc(100% - 32px));
        margin: 32px auto;
      }

      header {
        margin-bottom: 24px;
      }

      h1 {
        margin: 0 0 6px;
        font-size: 2rem;
        line-height: 1.2;
      }

      .subtitle {
        margin: 0;
        color: var(--muted);
      }

      .panel {
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 20px;
      }

      form {
        display: grid;
        gap: 16px;
      }

      label {
        display: grid;
        gap: 6px;
        font-weight: 650;
      }

      input[type="url"],
      input[type="number"],
      input[type="file"] {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 6px;
        color: var(--text);
        font: inherit;
        padding: 10px 12px;
        background: #fff;
      }

      input:focus {
        border-color: var(--accent);
        outline: 3px solid rgb(18 103 179 / 14%);
      }

      .grid {
        display: grid;
        grid-template-columns: 1fr 180px;
        gap: 16px;
      }

      .options {
        display: flex;
        align-items: center;
        gap: 16px;
        flex-wrap: wrap;
      }

      .checkbox {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        font-weight: 650;
      }

      button {
        justify-self: start;
        border: 0;
        border-radius: 6px;
        background: var(--accent);
        color: #fff;
        cursor: pointer;
        font: inherit;
        font-weight: 700;
        padding: 10px 18px;
      }

      button:hover:not(:disabled) {
        background: var(--accent-hover);
      }

      button:disabled {
        cursor: wait;
        opacity: 0.65;
      }

      .status {
        min-height: 24px;
        color: var(--muted);
        font-weight: 650;
      }

      .error {
        color: var(--danger);
      }

      .results {
        margin-top: 20px;
        display: none;
      }

      .summary {
        display: grid;
        grid-template-columns: 160px 1fr;
        gap: 16px;
        align-items: center;
        margin-bottom: 18px;
      }

      .score {
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 16px;
        text-align: center;
        background: #fff;
      }

      .score-value {
        display: block;
        font-size: 2.4rem;
        font-weight: 800;
        line-height: 1;
      }

      .score-label {
        color: var(--muted);
        font-size: 0.9rem;
      }

      .meta {
        color: var(--muted);
      }

      .issues {
        display: grid;
        gap: 10px;
        margin: 0;
        padding: 0;
        list-style: none;
      }

      .issue {
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 14px;
        background: #fff;
      }

      .issue-header {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 6px;
      }

      .issue-title {
        font-weight: 800;
      }

      .category {
        color: var(--muted);
        font-size: 0.9rem;
        white-space: nowrap;
      }

      .detail,
      .location,
      .evidence {
        margin: 4px 0 0;
        color: var(--muted);
        overflow-wrap: anywhere;
      }

      @media (max-width: 680px) {
        main {
          width: min(100% - 20px, 980px);
          margin: 20px auto;
        }

        .grid,
        .summary {
          grid-template-columns: 1fr;
        }

        button {
          width: 100%;
        }

        .issue-header {
          display: grid;
        }
      }
    </style>
    <script src="./config.js"></script>
  </head>
  <body>
    <main>
      <header>
        <h1>AI Code Risk Auditor</h1>
        <p class="subtitle">Scan a repository or zip archive for security and code quality risks.</p>
      </header>

      <section class="panel" aria-label="Scan form">
        <form id="scan-form">
          <div class="grid">
            <label>
              GitHub repo URL
              <input
                id="repo-url"
                name="repo_url"
                type="url"
                placeholder="https://github.com/owner/repo"
              />
            </label>

            <label>
              ZIP upload
              <input id="zip-file" name="zip_file" type="file" accept=".zip" />
            </label>
          </div>

          <div class="options">
            <label class="checkbox">
              <input id="llm-analysis" name="llm_analysis" type="checkbox" />
              LLM analysis
            </label>

            <label>
              Top files
              <input id="llm-top-n" name="llm_top_n" type="number" min="0" max="20" value="5" />
            </label>
          </div>

          <button id="scan-button" type="submit">Scan</button>
          <div id="status" class="status" role="status" aria-live="polite"></div>
        </form>
      </section>

      <section id="results" class="results" aria-label="Scan results">
        <div class="summary">
          <div class="score">
            <span id="risk-score" class="score-value">0</span>
            <span class="score-label">Risk score</span>
          </div>
          <div class="meta">
            <div id="project-path"></div>
            <div id="total-files"></div>
            <div id="issue-count"></div>
          </div>
        </div>

        <ul id="issues" class="issues"></ul>
      </section>
    </main>

    <script>
      const form = document.querySelector("#scan-form");
      const repoUrlInput = document.querySelector("#repo-url");
      const zipFileInput = document.querySelector("#zip-file");
      const llmAnalysisInput = document.querySelector("#llm-analysis");
      const llmTopNInput = document.querySelector("#llm-top-n");
      const scanButton = document.querySelector("#scan-button");
      const statusEl = document.querySelector("#status");
      const resultsEl = document.querySelector("#results");
      const riskScoreEl = document.querySelector("#risk-score");
      const projectPathEl = document.querySelector("#project-path");
      const totalFilesEl = document.querySelector("#total-files");
      const issueCountEl = document.querySelector("#issue-count");
      const issuesEl = document.querySelector("#issues");

      repoUrlInput.addEventListener("input", () => {
        if (repoUrlInput.value.trim()) {
          zipFileInput.value = "";
        }
      });

      zipFileInput.addEventListener("change", () => {
        if (zipFileInput.files.length > 0) {
          repoUrlInput.value = "";
        }
      });

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        clearStatus();

        const repoUrl = repoUrlInput.value.trim();
        const zipFile = zipFileInput.files[0];
        if (!repoUrl && !zipFile) {
          showError("Enter a GitHub repo URL or choose a ZIP file.");
          return;
        }

        const formData = new FormData();
        if (repoUrl) {
          formData.append("repo_url", repoUrl);
        }
        if (zipFile) {
          formData.append("zip_file", zipFile);
        }
        formData.append("llm_analysis", String(llmAnalysisInput.checked));
        formData.append("llm_top_n", llmTopNInput.value || "5");

        setLoading(true);
        try {
          const response = await fetch(`${getApiBaseUrl()}/scan`, {
            method: "POST",
            body: formData,
          });
          const payload = await response.json();
          if (!response.ok) {
            throw new Error(payload.detail || "Scan failed.");
          }

          renderReport(payload);
          statusEl.textContent = "Scan complete.";
        } catch (error) {
          showError(error.message || "Scan failed.");
        } finally {
          setLoading(false);
        }
      });

      function setLoading(isLoading) {
        scanButton.disabled = isLoading;
        scanButton.textContent = isLoading ? "Scanning..." : "Scan";
        statusEl.textContent = isLoading ? "Scanning project..." : statusEl.textContent;
      }

      function getApiBaseUrl() {
        return (window.APP_CONFIG && window.APP_CONFIG.apiBaseUrl) || "";
      }

      function clearStatus() {
        statusEl.classList.remove("error");
        statusEl.textContent = "";
      }

      function showError(message) {
        statusEl.classList.add("error");
        statusEl.textContent = message;
      }

      function renderReport(report) {
        const issues = flattenIssues(report.findings_by_category || {});
        riskScoreEl.textContent = `${report.risk_score ?? 0}/100`;
        projectPathEl.textContent = `Project: ${report.project_path || "Uploaded archive"}`;
        totalFilesEl.textContent = `Files scanned: ${report.total_files ?? 0}`;
        issueCountEl.textContent = `Issues found: ${issues.length}`;

        issuesEl.replaceChildren();
        if (issues.length === 0) {
          const emptyItem = document.createElement("li");
          emptyItem.className = "issue";
          emptyItem.textContent = "No issues found.";
          issuesEl.appendChild(emptyItem);
        } else {
          for (const issue of issues) {
            issuesEl.appendChild(renderIssue(issue));
          }
        }

        resultsEl.style.display = "block";
      }

      function flattenIssues(categories) {
        return Object.entries(categories).flatMap(([category, findings]) =>
          (findings || []).map((finding) => ({ ...finding, category }))
        );
      }

      function renderIssue(issue) {
        const item = document.createElement("li");
        item.className = "issue";

        const header = document.createElement("div");
        header.className = "issue-header";

        const title = document.createElement("div");
        title.className = "issue-title";
        title.textContent = issue.title || "Issue";

        const category = document.createElement("div");
        category.className = "category";
        category.textContent = formatCategory(issue.category);

        header.append(title, category);
        item.appendChild(header);

        const location = document.createElement("p");
        location.className = "location";
        location.textContent = formatLocation(issue.file_name, issue.line_number);
        item.appendChild(location);

        if (issue.detail) {
          const detail = document.createElement("p");
          detail.className = "detail";
          detail.textContent = issue.detail;
          item.appendChild(detail);
        }

        if (issue.evidence) {
          const evidence = document.createElement("p");
          evidence.className = "evidence";
          evidence.textContent = `Evidence: ${issue.evidence}`;
          item.appendChild(evidence);
        }

        return item;
      }

      function formatCategory(category) {
        if (category === "llm_analysis") {
          return "LLM Analysis";
        }

        return String(category || "")
          .replaceAll("_", " ")
          .replace(/\b\w/g, (letter) => letter.toUpperCase());
      }

      function formatLocation(fileName, lineNumber) {
        if (!fileName) {
          return "Location unavailable";
        }

        return lineNumber ? `${fileName}:${lineNumber}` : fileName;
      }
    </script>
  </body>
</html>
